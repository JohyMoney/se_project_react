<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple social media profile page" />
    <meta name="author" content="John Mahoney" />
    <meta
      name="keywords"
      content="html, css, javascript, profile, social media"
    />
    <title>Spot - Social Media Platform</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img
          src="<%=require('./images/Logo.svg')%>"
          alt="Spot Logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__avatar-container">
            <img
              src="<%=require('./images/avatar.jpg')%>"
              alt="Bessie Coleman"
              class="profile__avatar"
            />
            <button
              type="button"
              class="profile__avatar-btn"
              aria-label="Edit avatar"
            >
              <img
                src="<%=require('./images/pencil-light.svg')%>"
                alt="Pencil icon"
                class="profile__pencil-icon"
              />
            </button>
          </div>
          <div class="profile__column">
            <h1 class="profile__name">Bessie Coleman</h1>
            <p class="profile__description">Civil Aviator</p>
            <button type="button" class="profile__edit-btn">
              <img
                src="<%=require('./images/pencil.svg')%>"
                alt="Pencil icon"
              />Edit Profile
            </button>
          </div>
          <button type="button" class="profile__add-btn">
            <img src="<%=require('./images/plus.svg')%>" alt="Plus icon" /> New
            Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <button
                  class="card__delete-button"
                  type="button"
                  aria-label="Delete card"
                ></button>
                <img src="#" alt="#" class="card__image" />
                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button type="button" class="card__like-button"></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer">
        <div class="footer__columns">
          <p class="footer__copyright">&copy;2024 Spot</p>
        </div>
      </footer>
    </div>
    <div class="modal" id="edit-profile-modal">
      <div class="modal__container">
        <button
          type="button"
          class="modal__close-btn"
          aria-label="Close modal"
        ></button>
        <h2 class="modal__title">Edit Profile</h2>
        <form class="modal__form" id="edit-profile-form" novalidate>
          <label for="profile-name-input" class="modal__label">
            Name
            <input
              id="profile-name-input"
              type="text"
              class="modal__input"
              placeholder="John Mahoney"
              minlength="2"
              maxlength="40"
              required
            />
            <span id="profile-name-input-error" class="modal__error"></span>
          </label>
          <label for="profile-description-input" class="modal__label">
            Description
            <input
              id="profile-description-input"
              type="text"
              class="modal__input"
              placeholder="Software Developer"
              minlength="2"
              maxlength="200"
              required
            />
            <span
              id="profile-description-input-error"
              class="modal__error"
            ></span>
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <div class="modal" id="new-post-modal">
      <div class="modal__container">
        <button
          type="button"
          class="modal__close-btn"
          aria-label="Close modal"
        ></button>
        <h2 class="modal__title">New Post</h2>
        <form class="modal__form" id="new-post-form" novalidate>
          <label for="post-title-input" class="modal__label">
            Title
            <input
              id="post-title-input"
              type="text"
              class="modal__input"
              placeholder="Post title"
              required
              minlength="2"
              maxlength="30"
            />
            <span id="post-title-input-error" class="modal__error"></span>
          </label>
          <label for="post-image-input" class="modal__label">
            Image URL
            <input
              id="post-image-input"
              type="url"
              class="modal__input"
              placeholder="Place a link to the picture"
              minlength="2"
              maxlength="2000"
              required
            />
            <span id="post-image-input-error" class="modal__error"></span>
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <div class="modal modal_type_preview" id="preview-modal">
      <div class="modal__image-container">
        <button
          aria-label="Close modal"
          class="modal__close-btn modal__close-btn_type_preview"
          type="button"
        ></button>
        <img src="#" alt="" class="modal__image" />
        <p class="modal__caption"></p>
      </div>
    </div>
    <div class="modal" id="delete-modal">
      <div class="modal__container">
        <button
          type="button"
          class="modal__close-btn"
          aria-label="Close modal"
        ></button>
        <h2 class="modal__title">
          Are you sure you want to delete this image?
        </h2>
        <div class="modal__delete-actions">
          <button class="modal__submit-btn modal__submit-btn_type_delete" type="submit">
            Delete
          </button>
          <button class="modal__submit-btn modal__submit-btn_type_cancel" type="button">
            Cancel
          </button>
        </div>
      </div>
    </div>
    <!-- edit-profile-avatar modal -->
    <div class="modal" id="avatar-modal">
      <div class="modal__container">
        <button
          type="button"
          class="modal__close-btn"
          aria-label="Close modal"
        ></button>
        <h2 class="modal__title">Edit Profile Avatar</h2>
        <form class="modal__form" id="edit-profile-avatar-form" novalidate>
          <label for="avatar-image-input" class="modal__label">
            Image URL
            <input
              id="avatar-image-input"
              type="url"
              class="modal__input"
              placeholder="Place a link to the picture"
              minlength="2"
              maxlength="2000"
              required
            />
            <span id="avatar-image-input-error" class="modal__error"></span>
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
  </body>
</html>
